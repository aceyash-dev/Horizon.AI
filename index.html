<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon.AI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <style>
        :root {
            --blurple: #5865F2;
            --blurple-dark: #4752C4;
            --blurple-alpha: rgba(88, 101, 242, 0.4);
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 80%, #1a1a2e 100%);
            --text-light: #F2F3F5;
            --text-muted: #B5BAC1;
            --glass-bg: rgba(30, 32, 38, 0.4);
            --bg-code: rgba(15, 15, 20, 0.6);
            --border: rgba(255, 255, 255, 0.08);
        }

        body.light-mode {
            --bg-gradient: linear-gradient(135deg, #f0f2f5 0%, #e0e5ec 100%);
            --text-light: #2E3338;
            --text-muted: #5865F2;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --bg-code: rgba(240, 240, 245, 0.8);
            --border: rgba(88, 101, 242, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Space Grotesk', sans-serif; }

        body { 
            height: 100vh; 
            color: var(--text-light); 
            overflow: hidden; 
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .glass {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border) !important;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }

        /* Landing Page & Auth */
        #landing-page { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: inherit; }
        .auth-card { padding: 40px; border-radius: 24px; text-align: center; width: 400px; animation: scaleIn 0.5s ease;}
        
        .btn-auth { color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; margin-top: 12px; font-size: 1rem; transition: transform 0.2s, background 0.2s, box-shadow 0.2s;}
        .btn-auth:hover { transform: translateY(-2px); }
        .btn-github { background: #24292e; }
        .btn-github:hover { background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-google { background: #ffffff; color: #757575; border: 1px solid #ddd; }
        .btn-google:hover { background: #f1f1f1; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-ghost { background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); margin-top: 24px; }
        .btn-ghost:hover { background: rgba(255,255,255,0.05); color: var(--text-light); border-color: var(--text-light); }

        /* Sidebar & Layout */
        #app-container { display: none; height: 100vh; width: 100vw; padding: 10px; }
        .app-flex { display: flex; height: 100%; gap: 10px; min-height: 0;}
        .sidebar { width: 280px; padding: 20px; display: flex; flex-direction: column; gap: 12px; border-radius: 16px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto;}
        .sidebar.collapsed { width: 0; padding: 0; opacity: 0; pointer-events: none; margin: 0; border: none !important; }
        
        .brand { font-weight: 700; font-size: 1.4rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; white-space: nowrap;}
        .sidebar-btn { background: transparent; color: var(--text-light); border: none; padding: 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: 500; white-space: nowrap; transition: background 0.2s;}
        .sidebar-btn:hover { background: rgba(255,255,255,0.1); }
        
        .user-profile { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 12px; margin-top: auto; border: 1px solid var(--border); white-space: nowrap; }
        .user-profile img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--blurple); }
        .user-profile-info { display: flex; flex-direction: column; }
        .user-profile-name { font-weight: 600; font-size: 0.9rem; }
        .user-profile-status { font-size: 0.75rem; color: var(--blurple); display: flex; align-items: center; gap: 4px; }

        /* Chat Area & Top Bar */
        .chat-container { flex: 1; display: flex; flex-direction: column; border-radius: 16px; overflow: hidden; min-height: 0; min-width: 0;}
        .top-bar { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.05); z-index: 5;}
        .btn-icon { background: transparent; border: none; color: var(--text-light); font-size: 1.4rem; cursor: pointer; padding: 8px; border-radius: 8px; display: flex; align-items: center; transition: background 0.2s, color 0.2s;}
        .btn-icon:hover { background: rgba(0,0,0,0.1); color: var(--blurple); }

        .ghost-badge { display: none; background: rgba(255, 255, 255, 0.1); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; color: #ff4757; border: 1px solid #ff4757; align-items: center; gap: 5px; }
        .ghost-badge.active { display: flex; animation: slideUp 0.3s; }

        /* Messages */
        .messages { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; min-height: 0;}
        .message { display: flex; flex-direction: column; max-width: 85%; animation: slideUp 0.3s ease forwards; }
        .message.user { align-self: flex-end; }
        .message.ai { align-self: flex-start; }
        .message-sender { font-size: 0.85rem; margin-bottom: 6px; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .message.user .message-sender { flex-direction: row-reverse; }
        .message-content { padding: 16px 20px; border-radius: 16px; line-height: 1.6; word-wrap: break-word; font-size: 1rem; color: var(--text-light); }
        .message.user .message-content { background: linear-gradient(135deg, var(--blurple), var(--blurple-dark)); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px var(--blurple-alpha); white-space: pre-wrap; }
        .message.ai .message-content { border-bottom-left-radius: 4px; }
        .message-image { max-width: 300px; border-radius: 8px; margin-top: 10px; border: 1px solid var(--border); }

        /* Markdown & Code */
        .message-content p { margin-bottom: 12px; }
        .message-content p:last-child { margin-bottom: 0; }
        .message-content a { color: #8ea1ff; text-decoration: none; display: inline-flex; align-items: center; gap: 4px;}
        .code-wrapper { background-color: var(--bg-code); border-radius: 12px; border: 1px solid var(--border); margin: 16px 0; overflow: hidden; }
        .code-header { background: rgba(0, 0, 0, 0.4); padding: 8px 16px; display: flex; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border); text-transform: uppercase; align-items: center; gap: 6px;}
        .code-wrapper pre { padding: 16px; margin: 0; overflow-x: auto; }
        .code-wrapper code { font-family: 'Courier New', monospace; font-size: 0.95em; color: var(--text-light); }
        .message-content p code { background-color: rgba(0,0,0,0.4); padding: 3px 6px; border-radius: 6px; font-size: 0.9em; border: 1px solid var(--border); color: #a3a8ff; font-family: 'Courier New', monospace;}

        /* Input Area with Image Preview */
        .input-container { border-top: 1px solid var(--border); background: rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .preview-area { display: flex; gap: 10px; padding: 0 20px; overflow-x: auto; }
        .preview-area:not(:empty) { padding-top: 15px; }
        .preview-item { position: relative; width: 60px; height: 60px; border-radius: 8px; border: 1px solid var(--blurple); overflow: hidden; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .preview-item button { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center;}
        
        .input-area { padding: 15px 20px; display: flex; gap: 12px; align-items: center; }
        textarea { flex: 1; background: rgba(0,0,0,0.1); color: var(--text-light); border: 1px solid var(--border); border-radius: 12px; padding: 14px; height: 56px; resize: none; outline: none; font-size: 1rem; transition: border-color 0.2s;}
        textarea:focus { border-color: var(--blurple); }
        
        .btn-send { background-color: var(--blurple); color: white; border: none; width: 56px; height: 56px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: all 0.2s; box-shadow: 0 4px 15px var(--blurple-alpha); }
        .btn-send:hover { background-color: var(--blurple-dark); transform: scale(1.05); }
        .btn-send:disabled { background: rgba(255,255,255,0.1); color: var(--text-muted); cursor: not-allowed; box-shadow: none; transform: none; }

        /* Settings Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 200; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; animation: fadeIn 0.2s ease forwards; }
        .modal-content { padding: 30px; border-radius: 20px; width: 450px; max-width: 90%; max-height: 90vh; overflow-y: auto; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .form-group label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; display: flex; align-items: center; gap: 6px;}
        .form-group input, .form-group select { padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); color: var(--text-light); outline: none; font-size: 1rem; transition: border-color 0.2s;}
        .form-group input:focus, .form-group select:focus { border-color: var(--blurple); }

        /* Custom Model Selector */
        .custom-select-wrapper { position: relative; width: 100%; user-select: none; }
        .custom-select-trigger { padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .custom-select-options { display: none; position: absolute; top: calc(100% + 8px); left: 0; right: 0; max-height: 280px; border-radius: 12px; z-index: 10; padding: 0; flex-direction: column; overflow: hidden; }
        .custom-select-options.open { display: flex; animation: slideUp 0.2s ease forwards; }
        .search-container { padding: 10px; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; position: sticky; top: 0; z-index: 11;}
        .search-container input { width: 100%; background: transparent; border: none; color: var(--text-light); outline: none; }
        .options-list-scroll { overflow-y: auto; max-height: 230px; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
        .optgroup-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; padding: 10px 12px 4px; display: flex; align-items: center; gap: 6px;}
        .custom-option { padding: 10px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: background 0.2s ease;}
        .custom-option:hover { background: rgba(255,255,255,0.1); }
        .custom-option.selected { background: var(--blurple-alpha); border: 1px solid var(--blurple); }
        .brand-logo { width: 24px; height: 24px; border-radius: 6px; object-fit: contain; background: white; padding: 2px;}
        .fallback-logo { width: 24px; height: 24px; border-radius: 6px; background: linear-gradient(135deg, var(--blurple), #a334fa); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; color: white;}

        .switch-group { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 16px;}
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: var(--text-muted); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--blurple); }
        input:checked + .slider:before { transform: translateX(22px); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
    </style>
</head>
<body class="dark-mode">

    <div id="landing-page">
        <div class="auth-card glass">
            <h1 style="margin-bottom:10px;"><i class="ph-fill ph-planet" style="color:var(--blurple)"></i> Horizon</h1>
            <p style="color:var(--text-muted); margin-bottom: 24px;"><i class="ph-fill ph-lock-key"></i> Secure Local Workspace</p>
            
            <button class="btn-auth btn-github" onclick="window.triggerGithubLogin()">
                <i class="ph-fill ph-github-logo" style="font-size: 1.2rem;"></i> Login with GitHub
            </button>
            
            <button class="btn-auth btn-google" onclick="window.triggerGoogleLogin()">
                <i class="ph-fill ph-google-logo" style="font-size: 1.2rem;"></i> Login with Google
            </button>

            <button class="btn-auth btn-ghost" onclick="window.enterGhostMode()">
                <i class="ph-fill ph-ghost" style="font-size: 1.2rem;"></i> Continue in Ghost Mode
            </button>

            <p style="font-size: 0.8rem; margin-top: 20px; opacity: 0.6;"><i class="ph-fill ph-database"></i> Histories saved locally on-device</p>
        </div>
    </div>

    <div id="app-container">
        <div class="app-flex">
            <div class="sidebar glass" id="mainSidebar">
                <div class="brand">
                    <i class="ph-fill ph-planet" style="color:var(--blurple)"></i> Horizon
                </div>
                <button class="sidebar-btn" onclick="window.clearChat()">
                    <i class="ph-fill ph-plus-circle" style="color:var(--blurple)"></i> New Chat
                </button>
                <div style="flex:1"></div>
                <button class="sidebar-btn" onclick="window.toggleSettings(true)">
                    <i class="ph-fill ph-faders" style="color:var(--blurple)"></i> Configuration
                </button>
                
                <div class="user-profile">
                    <img id="userProfileAvatar" src="https://via.placeholder.com/36" alt="Avatar">
                    <div class="user-profile-info">
                        <span class="user-profile-name" id="userProfileName">Developer</span>
                        <span class="user-profile-status" id="userProfileStatus"><i class="ph-fill ph-shield-check"></i> Authenticated</span>
                    </div>
                </div>
                
                <button class="sidebar-btn" onclick="window.triggerLogout()" style="margin-top: 5px;">
                    <i class="ph-fill ph-sign-out" style="color:#ff4757"></i> Logout
                </button>
            </div>

            <div class="chat-container glass">
                <div class="top-bar">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <button class="btn-icon" onclick="window.toggleSidebar()" title="Toggle Menu"><i class="ph-fill ph-list"></i></button>
                        <div class="ghost-badge" id="ghostIndicator"><i class="ph-fill ph-ghost"></i> GHOST MODE ACTIVE</div>
                    </div>
                    <button class="btn-icon" onclick="window.toggleTheme()" title="Toggle Theme">
                        <i class="ph-fill ph-sun-dim" id="themeIcon"></i>
                    </button>
                </div>

                <div class="messages" id="chatBox">
                    <div style="text-align: center; color: var(--text-muted); font-size: 0.95rem; margin: auto; display: flex; flex-direction: column; align-items: center; gap: 10px;" id="placeholderMsg">
                        <i class="ph-fill ph-sparkle" style="font-size: 2.5rem; color: var(--blurple);"></i>
                        <span>Welcome. Configure your API key to begin.</span>
                    </div>
                </div>
                
                <div class="input-container">
                    <div class="preview-area" id="imagePreviewContainer"></div>
                    <div class="input-area">
                        <input type="file" id="fileAttach" accept="image/*" style="display:none" multiple onchange="window.handleFileUpload(event)">
                        <button class="btn-icon" style="border:1px solid var(--border); padding: 14px; border-radius: 12px; height: 56px;" onclick="document.getElementById('fileAttach').click()" title="Attach Images">
                            <i class="ph-fill ph-image"></i>
                        </button>
                        <textarea id="userInput" placeholder="Message Horizon.AI..." onkeypress="window.handleEnter(event)"></textarea>
                        <button class="btn-send" id="sendBtn" onclick="window.sendMessage()">
                            <i class="ph-fill ph-paper-plane-tilt"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content glass">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <h2 style="font-size:1.2rem; display:flex; align-items:center; gap:8px;"><i class="ph-fill ph-sliders-horizontal"></i> Configuration</h2>
                <button class="btn-icon" onclick="window.toggleSettings(false)"><i class="ph-bold ph-x"></i></button>
            </div>

            <div class="switch-group" id="settingsGhostToggleGroup">
                <span style="font-weight:600; font-size:0.9rem; display:flex; align-items:center; gap:8px;"><i class="ph-fill ph-ghost"></i> Ephemeral Mode</span>
                <label class="switch">
                    <input type="checkbox" id="ghostToggle" onchange="window.updateGhostMode()">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="form-group">
                <label for="provider"><i class="ph-fill ph-cloud-network"></i> AI Provider</label>
                <select id="provider" onchange="window.handleProviderChange()">
                    <option value="openrouter">OpenRouter</option>
                    <option value="aistudio">Google AI Studio</option>
                </select>
            </div>

            <div class="form-group">
                <label for="apiKey"><i class="ph-fill ph-key"></i> API Key</label>
                <input type="password" id="apiKey" placeholder="Enter API Key" onchange="window.saveSettings()">
            </div>

            <button onclick="window.fetchModels()" id="fetchBtn" style="background:var(--blurple); color:white; border:none; padding:14px; border-radius:12px; width:100%; font-weight:600; cursor:pointer; margin-bottom:16px; display:flex; justify-content:center; align-items:center; gap:8px; transition: transform 0.2s;">
                <i class="ph-bold ph-arrows-clockwise"></i> Fetch Models
            </button>

            <div class="form-group">
                <label><i class="ph-fill ph-cpu"></i> Select Model</label>
                <div class="custom-select-wrapper">
                    <div class="custom-select-trigger" id="modelSelectTrigger" onclick="window.toggleModelDropdown()">
                        <span>Fetch models first...</span>
                        <i class="ph-bold ph-caret-down"></i>
                    </div>
                    <div class="custom-select-options glass" id="modelSelectOptions">
                        <div class="search-container">
                            <i class="ph-bold ph-magnifying-glass"></i>
                            <input type="text" id="modelSearchBox" placeholder="Search models..." onkeyup="window.filterModels()" onclick="event.stopPropagation()">
                        </div>
                        <div class="options-list-scroll" id="modelListContainer"></div>
                    </div>
                </div>
                <input type="hidden" id="modelSelect" onchange="window.saveSettings()">
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-analytics.js";
        import { getAuth, signInWithPopup, GithubAuthProvider, GoogleAuthProvider, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAvg0MRndHXMLjhrJIukBRjzZ4ztRcEhfQ",
            authDomain: "ace-horizon.firebaseapp.com",
            projectId: "ace-horizon",
            storageBucket: "ace-horizon.firebasestorage.app",
            messagingSenderId: "1017523773217",
            appId: "1:1017523773217:web:dbd7f5aa31f234d32aa860",
            measurementId: "G-8TF3HYRPK6"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const githubProvider = new GithubAuthProvider();
        const googleProvider = new GoogleAuthProvider();

        // Application State
        let chatHistory = [];       
        let uiHistory = [];         
        let allModelsData = {}; 
        let attachedImagesBase64 = [];
        let isGhostMode = false;

        // --- AUTHENTICATION & ENTRY PATHS ---
        window.triggerGithubLogin = async () => {
            try { 
                await setPersistence(auth, browserLocalPersistence);
                await signInWithPopup(auth, githubProvider); 
            } catch (error) { 
                console.error(error);
                alert("GitHub Auth failed: " + error.message); 
            }
        };

        window.triggerGoogleLogin = async () => {
            try { 
                await setPersistence(auth, browserLocalPersistence);
                await signInWithPopup(auth, googleProvider); 
            } catch (error) { 
                console.error(error);
                alert("Google Auth failed: " + error.message); 
            }
        };

        window.enterGhostMode = () => {
            isGhostMode = true;
            document.getElementById('ghostToggle').checked = true;
            document.getElementById('ghostIndicator').classList.add('active');
            
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            
            document.getElementById('userProfileName').innerText = 'Ghost User';
            document.getElementById('userProfileStatus').innerHTML = '<i class="ph-fill ph-eye-closed"></i> Incognito';
            document.getElementById('userProfileAvatar').src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect width="256" height="256" fill="none"/><path d="M128,24A104,104,0,0,0,24,128c0,50.4,32.3,92.5,78,102.5V176a32,32,0,0,1,64,0v54.5c45.7-10,78-52.1,78-102.5A104,104,0,0,0,128,24Z" opacity="0.2"/><path d="M226.3,101.4a104,104,0,1,0-196.6,0C17,117.7,16,134.5,16,144c0,56,41.9,80,64,80a31.4,31.4,0,0,0,19.3-6.6A16,16,0,0,1,118.6,216a16,16,0,0,0,18.8,0,16,16,0,0,1,19.3,1.4A31.4,31.4,0,0,0,176,224c22.1,0,64-24,64-80C240,134.5,239,117.7,226.3,101.4ZM176,208a15.8,15.8,0,0,1-9.6-3.3,32.1,32.1,0,0,0-38.6-2.8,32.1,32.1,0,0,0-38.6,2.8A15.8,15.8,0,0,1,80,208c-12.7,0-48-15.5-48-64,0-9,1.1-24.5,12.2-44a88,88,0,1,1,167.6,0c11.1,19.5,12.2,35,12.2,44C224,192.5,188.7,208,176,208ZM88,104a12,12,0,1,1,12,12A12,12,0,0,1,88,104Zm56,0a12,12,0,1,1,12,12A12,12,0,0,1,144,104Z" fill="%23B5BAC1"/></svg>';
            
            document.getElementById('chatBox').innerHTML = '<div style="text-align: center; color: var(--text-muted); font-size: 0.95rem; margin: auto;"><i class="ph-fill ph-ghost" style="font-size: 2.5rem; color: #ff4757;"></i><br>Ghost Mode Active. Memories are disabled.</div>';
        };

        window.triggerLogout = async () => {
            if (isGhostMode) location.reload();
            else { await signOut(auth); location.reload(); }
        };

        onAuthStateChanged(auth, (user) => {
            if (isGhostMode) return; 
            
            if (user) {
                document.getElementById('landing-page').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('userProfileName').innerText = user.displayName || 'Developer';
                document.getElementById('userProfileAvatar').src = user.photoURL || 'https://via.placeholder.com/36';
                
                const providerData = user.providerData[0]?.providerId;
                const providerIcon = providerData === 'google.com' ? 'ph-google-logo' : 'ph-github-logo';
                document.getElementById('userProfileStatus').innerHTML = `<i class="ph-fill ${providerIcon}"></i> Authenticated`;

                window.loadLocalHistory();
            } else {
                document.getElementById('landing-page').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        });

        // --- LOCAL STORAGE & MEMORY ---
        window.loadLocalHistory = () => {
            const savedUI = localStorage.getItem('horizon_ui_history');
            const savedAPI = localStorage.getItem('horizon_api_history');
            
            if (savedUI && savedAPI) {
                try {
                    uiHistory = JSON.parse(savedUI);
                    chatHistory = JSON.parse(savedAPI);
                    
                    if(uiHistory.length > 0) document.getElementById('placeholderMsg')?.remove();
                    
                    uiHistory.forEach(msg => {
                        window.appendMessageToDOM(msg.role, msg.text, msg.images, true);
                    });
                } catch(e) { console.error("History parse error", e); }
            }
        };

        window.saveLocalHistory = () => {
            if (isGhostMode) return;
            localStorage.setItem('horizon_ui_history', JSON.stringify(uiHistory));
            localStorage.setItem('horizon_api_history', JSON.stringify(chatHistory));
        };

        // --- MARKDOWN ENGINE ---
        const renderer = new marked.Renderer();
        renderer.code = function(code, language) {
            const lang = language || 'text';
            const escapedCode = code.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
            return `<div class="code-wrapper"><div class="code-header"><i class="ph-bold ph-file-code"></i> ${lang.toUpperCase()}</div><pre><code class="language-${lang}">${escapedCode}</code></pre></div>`;
        };
        marked.use({ renderer });
        marked.setOptions({ breaks: true, gfm: true });

        // --- SETTINGS RETRIEVAL ---
        const savedProvider = localStorage.getItem('horizon_provider') || 'openrouter';
        const savedKey = localStorage.getItem('horizon_key') || '';
        const savedModel = localStorage.getItem('horizon_model') || '';
        document.getElementById('provider').value = savedProvider;
        document.getElementById('apiKey').value = savedKey;
        if (savedKey && savedModel) {
            document.getElementById('modelSelect').value = savedModel;
            document.getElementById('modelSelectTrigger').innerHTML = `<span>${savedModel}</span> <i class="ph-bold ph-caret-down"></i>`;
        }

        // --- UI TOGGLES ---
        window.toggleSidebar = () => document.getElementById('mainSidebar').classList.toggle('collapsed');
        window.toggleSettings = (show) => {
            const modal = document.getElementById('settingsModal');
            show ? modal.classList.add('active') : modal.classList.remove('active');
        };
        window.toggleTheme = () => {
            document.body.classList.toggle('light-mode');
            document.getElementById('themeIcon').className = document.body.classList.contains('light-mode') ? 'ph-fill ph-moon' : 'ph-fill ph-sun-dim';
        };
        window.updateGhostMode = () => {
            isGhostMode = document.getElementById('ghostToggle').checked;
            document.getElementById('ghostIndicator').classList.toggle('active', isGhostMode);
        };
        window.saveSettings = () => {
            localStorage.setItem('horizon_provider', document.getElementById('provider').value);
            localStorage.setItem('horizon_key', document.getElementById('apiKey').value);
            localStorage.setItem('horizon_model', document.getElementById('modelSelect').value);
        };
        window.handleProviderChange = () => {
            document.getElementById('modelSelectTrigger').innerHTML = `<span>Fetch models first...</span> <i class="ph-bold ph-caret-down"></i>`;
            document.getElementById('modelListContainer').innerHTML = '';
            document.getElementById('modelSelect').value = '';
            window.saveSettings();
        };

        // --- CUSTOM SELECTOR ---
        window.toggleModelDropdown = () => {
            const optionsDiv = document.getElementById('modelSelectOptions');
            if (document.getElementById('modelListContainer').innerHTML.trim() !== "") {
                optionsDiv.classList.toggle('open');
                if(optionsDiv.classList.contains('open')) document.getElementById('modelSearchBox').focus();
            }
        };
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.custom-select-wrapper')) {
                document.getElementById('modelSelectOptions')?.classList.remove('open');
            }
        });
        window.filterModels = () => {
            const query = document.getElementById('modelSearchBox').value.toLowerCase();
            document.querySelectorAll('.custom-option').forEach(opt => {
                opt.style.display = opt.innerText.toLowerCase().includes(query) ? 'flex' : 'none';
            });
            document.querySelectorAll('.optgroup-label').forEach(group => {
                let hasVisible = false, next = group.nextElementSibling;
                while (next && next.classList.contains('custom-option')) {
                    if (next.style.display !== 'none') { hasVisible = true; break; }
                    next = next.nextElementSibling;
                }
                group.style.display = hasVisible ? 'flex' : 'none';
            });
        };

        // --- MODEL FETCHING ---
        window.fetchModels = async () => {
            const provider = document.getElementById('provider').value;
            const apiKey = document.getElementById('apiKey').value;
            const trigger = document.getElementById('modelSelectTrigger');
            if (!apiKey) return alert("Please enter an API key.");
            
            trigger.innerHTML = `<span><i class="ph-bold ph-spinner ph-spin"></i> Loading...</span> <i class="ph-bold ph-caret-down"></i>`;
            try {
                let modelsArray = [];
                if (provider === 'openrouter') {
                    const res = await fetch("https://openrouter.ai/api/v1/models", {
                        headers: { 
                            "Authorization": `Bearer ${apiKey}`,
                            "HTTP-Referer": window.location.href,
                            "X-Title": "Horizon.AI"
                        }
                    });
                    if (!res.ok) throw new Error(`Status ${res.status}`);
                    const data = await res.json();
                    modelsArray = data.data.map(m => m.id);
                } else if (provider === 'aistudio') {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                    if (!res.ok) throw new Error(`Status ${res.status}`);
                    const data = await res.json();
                    if(data.error) throw new Error(data.error.message);
                    modelsArray = data.models.filter(m => m.supportedGenerationMethods.includes("generateContent")).map(m => m.name.replace('models/', '')); 
                }
                window.groupAndRenderModels(modelsArray, provider);
            } catch (error) {
                console.error(error);
                trigger.innerHTML = `<span>Error fetching models</span> <i class="ph-bold ph-caret-down"></i>`;
                alert("Failed to fetch models. Detail: " + error.message);
            }
        };

        window.getBrandLogo = (brand) => {
            const domains = { 'openai': 'openai.com', 'google': 'google.com', 'anthropic': 'anthropic.com', 'meta': 'meta.com', 'mistral': 'mistral.ai', 'cohere': 'cohere.com', 'perplexity': 'perplexity.ai' };
            const domain = domains[brand.toLowerCase()];
            if (domain) return `<img src="https://logo.clearbit.com/${domain}" onerror="this.outerHTML='<div class=\\'fallback-logo\\'>${brand.charAt(0).toUpperCase()}</div>'" class="brand-logo" />`;
            return `<div class="fallback-logo">${brand.charAt(0).toUpperCase()}</div>`;
        }

        window.groupAndRenderModels = (modelsArray, provider) => {
            allModelsData = {}; 
            modelsArray.forEach(m => {
                let brand = 'Other', displayName = m;
                if (provider === 'openrouter') {
                    const parts = m.split('/');
                    if (parts.length > 1) { brand = parts[0]; displayName = parts.slice(1).join('/'); }
                } else { brand = 'Google'; }
                brand = brand.charAt(0).toUpperCase() + brand.slice(1);
                if (!allModelsData[brand]) allModelsData[brand] = [];
                allModelsData[brand].push({ id: m, name: displayName });
            });

            const optionsContainer = document.getElementById('modelListContainer');
            optionsContainer.innerHTML = '';
            for (const [brand, models] of Object.entries(allModelsData)) {
                const groupLabel = document.createElement('div');
                groupLabel.className = 'optgroup-label';
                groupLabel.innerHTML = `<i class="ph-fill ph-buildings"></i> ${brand}`;
                optionsContainer.appendChild(groupLabel);

                models.forEach(model => {
                    const opt = document.createElement('div');
                    opt.className = 'custom-option';
                    opt.innerHTML = `${window.getBrandLogo(brand)} <span>${model.name}</span>`;
                    opt.onclick = () => {
                        document.getElementById('modelSelect').value = model.id;
                        document.getElementById('modelSelectTrigger').innerHTML = `${window.getBrandLogo(brand)} <span>${model.name}</span> <i class="ph-bold ph-caret-down"></i>`;
                        document.getElementById('modelSelectOptions').classList.remove('open');
                        document.querySelectorAll('.custom-option').forEach(el => el.classList.remove('selected'));
                        opt.classList.add('selected');
                        window.saveSettings();
                    };
                    optionsContainer.appendChild(opt);
                });
            }
            document.getElementById('modelSelectTrigger').innerHTML = `<span>Select a model...</span> <i class="ph-bold ph-caret-down"></i>`;
        }

        // --- FILE ATTACHMENTS ---
        window.handleFileUpload = (event) => {
            const files = event.target.files;
            if (!files) return;
            const container = document.getElementById('imagePreviewContainer');
            Array.from(files).forEach(file => {
                if (!file.type.startsWith('image/')) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    attachedImagesBase64.push(e.target.result);
                    const index = attachedImagesBase64.length - 1;
                    const div = document.createElement('div');
                    div.className = 'preview-item';
                    div.innerHTML = `<img src="${e.target.result}"><button onclick="window.removeImage(${index}, this)"><i class="ph-bold ph-x"></i></button>`;
                    container.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
            event.target.value = '';
        };
        window.removeImage = (index, btn) => {
            attachedImagesBase64.splice(index, 1);
            btn.parentElement.remove();
            Array.from(document.getElementById('imagePreviewContainer').children).forEach((child, newIdx) => {
                child.querySelector('button').setAttribute('onclick', `window.removeImage(${newIdx}, this)`);
            });
        };

        // --- CHAT ENGINE & UI ---
        window.handleEnter = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.sendMessage(); } };
        
        window.clearChat = () => { 
            chatHistory = []; 
            uiHistory = [];
            window.saveLocalHistory();
            document.getElementById('chatBox').innerHTML = '<div style="text-align: center; color: var(--text-muted); font-size: 0.95rem; margin: auto;"><i class="ph-fill ph-sparkle" style="font-size: 2.5rem; color: var(--blurple);"></i><br>Session Cleared.</div>'; 
        };

        window.sendMessage = async () => {
            const inputEl = document.getElementById('userInput');
            const text = inputEl.value.trim();
            const provider = document.getElementById('provider').value;
            const apiKey = document.getElementById('apiKey').value;
            const model = document.getElementById('modelSelect').value;
            const sendBtn = document.getElementById('sendBtn');

            if ((!text && attachedImagesBase64.length === 0) || !apiKey || !model) {
                if(!apiKey || !model) { window.toggleSettings(true); alert("Ensure API key and Model are selected."); }
                return;
            }

            window.appendMessageToDOM('user', text, attachedImagesBase64);
            uiHistory.push({ role: 'user', text: text, images: [...attachedImagesBase64] });
            
            let payloadContent = text;
            if (provider === 'openrouter' && attachedImagesBase64.length > 0) {
                payloadContent = text ? [{ type: "text", text: text }] : [];
                attachedImagesBase64.forEach(img => payloadContent.push({ type: "image_url", image_url: { url: img } }));
            }
            
            const currentRequestHistory = [...chatHistory, { role: 'user', content: payloadContent, images: [...attachedImagesBase64] }];
            
            if(!isGhostMode) {
                chatHistory.push({ role: 'user', content: payloadContent, images: [...attachedImagesBase64] });
                window.saveLocalHistory();
            }

            inputEl.value = '';
            attachedImagesBase64 = [];
            document.getElementById('imagePreviewContainer').innerHTML = '';
            sendBtn.disabled = true;

            try {
                let aiResponseText = "";
                if (provider === 'openrouter') {
                    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                        method: "POST", headers: { 
                            "Authorization": `Bearer ${apiKey}`, 
                            "Content-Type": "application/json",
                            "HTTP-Referer": window.location.href,
                            "X-Title": "Horizon.AI"
                        },
                        body: JSON.stringify({ model: model, messages: currentRequestHistory.map(m => ({role: m.role, content: m.content})) })
                    });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);
                    aiResponseText = data.choices[0].message.content;

                } else if (provider === 'aistudio') {
                    const geminiHistory = currentRequestHistory.map(msg => {
                        let parts = [];
                        if (typeof msg.content === 'string' && msg.content) parts.push({ text: msg.content });
                        if (msg.images && msg.images.length > 0) {
                            msg.images.forEach(img => parts.push({ inlineData: { data: img.split(',')[1], mimeType: img.split(';')[0].split(':')[1] } }));
                        }
                        return { role: msg.role === 'user' ? 'user' : 'model', parts: parts };
                    });
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: geminiHistory })
                    });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);
                    aiResponseText = data.candidates[0].content.parts[0].text;
                }

                window.appendMessageToDOM('ai', aiResponseText);
                
                if(!isGhostMode) {
                    uiHistory.push({ role: 'ai', text: aiResponseText, images: [] });
                    chatHistory.push({ role: 'assistant', content: aiResponseText });
                    window.saveLocalHistory();
                }

            } catch (error) {
                console.error(error);
                window.appendMessageToDOM('ai', `⚠️ Error: ${error.message}`);
                if(!isGhostMode) {
                    chatHistory.pop();
                    uiHistory.pop();
                    window.saveLocalHistory();
                }
            } finally {
                sendBtn.disabled = false;
            }
        };

        window.appendMessageToDOM = (role, text, images = [], isLoadingFromLocal = false) => {
            document.getElementById('placeholderMsg')?.remove();
            const chatBox = document.getElementById('chatBox');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            const authUser = auth.currentUser;
            const userName = isGhostMode ? 'Ghost User' : (authUser ? (authUser.displayName || 'Developer') : 'Developer');
            
            msgDiv.innerHTML = `
                <div class="message-sender">
                    ${role === 'user' ? `${userName} <i class="ph-fill ph-user-circle"></i>` : '<i class="ph-fill ph-planet"></i> Horizon'}
                </div>
                <div class="message-content ${role === 'ai' ? 'glass' : ''}"></div>
            `;
            
            const contentDiv = msgDiv.querySelector('.message-content');
            if (role === 'ai') {
                contentDiv.innerHTML = DOMPurify.sanitize(marked.parse(text));
            } else {
                contentDiv.innerText = text; 
                images.forEach(imgSrc => {
                    const img = document.createElement('img');
                    img.src = imgSrc;
                    img.className = 'message-image';
                    contentDiv.appendChild(img);
                });
            }
            chatBox.appendChild(msgDiv);
            if(!isLoadingFromLocal) chatBox.scrollTop = chatBox.scrollHeight;
        };
    </script>
</body>
</html>
