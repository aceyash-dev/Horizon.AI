<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon.AI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <style>
        :root {
            --blurple: #5865F2;
            --blurple-dark: #4752C4;
            --blurple-alpha: rgba(88, 101, 242, 0.4);
            --text-light: #F2F3F5;
            --text-muted: #B5BAC1;
            --bg-code: rgba(15, 15, 20, 0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Space Grotesk', sans-serif; }

        body { 
            height: 100vh; 
            color: var(--text-light); 
            overflow: hidden; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 80%, #1a1a2e 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass {
            background: rgba(30, 32, 38, 0.4) !important;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Landing Page */
        #landing-page { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s ease; background: inherit; }
        #landing-page::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); z-index: -1; }
        #landing-page h1 { font-size: 4rem; color: var(--blurple); margin-bottom: 10px; font-weight: 700; letter-spacing: -1px; animation: slideUp 0.8s ease; text-shadow: 0 0 20px var(--blurple-alpha); display: flex; align-items: center; gap: 15px;}
        #landing-page p { font-size: 1.2rem; color: var(--text-muted); margin-bottom: 30px; animation: slideUp 1s ease; }
        .btn-launch { background-color: var(--blurple); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: 1.2rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; animation: slideUp 1.2s ease; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px var(--blurple-alpha); }
        .btn-launch:hover { background-color: var(--blurple-dark); transform: translateY(-2px); box-shadow: 0 10px 25px var(--blurple-alpha); }

        /* App Layout - Scroll Fix Applied Here */
        #app-container { display: none; height: 100vh; width: 100vw; opacity: 0; animation: fadeIn 0.5s ease forwards; padding: 10px; }
        .app-flex { display: flex; height: 100%; gap: 10px; min-height: 0; }

        /* Sidebar */
        .sidebar { width: 280px; padding: 20px; display: flex; flex-direction: column; gap: 15px; border-radius: 16px; overflow-y: auto; }
        .brand { display: flex; align-items: center; gap: 10px; color: #fff; font-size: 1.5rem; font-weight: 700; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 10px; text-shadow: 0 0 10px rgba(255,255,255,0.3);}
        .brand i { color: var(--blurple); }
        
        .sidebar-btn { background: transparent; color: var(--text-light); border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 1rem; font-weight: 500; display: flex; align-items: center; gap: 12px; transition: all 0.2s; text-align: left; }
        .sidebar-btn:hover { background: rgba(255,255,255,0.1); }
        .sidebar-btn i { font-size: 1.2rem; color: var(--blurple); }
        .spacer { flex: 1; }

        /* Chat Area - Scroll Fix Applied Here */
        .chat-container { flex: 1; display: flex; flex-direction: column; position: relative; border-radius: 16px; overflow: hidden; min-height: 0; min-width: 0; }
        .messages { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth; min-height: 0; }
        
        .message { display: flex; flex-direction: column; max-width: 85%; animation: slideUp 0.3s ease forwards; }
        .message.user { align-self: flex-end; }
        .message.ai { align-self: flex-start; }
        
        .message-sender { font-size: 0.85rem; margin-bottom: 6px; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .message.user .message-sender { flex-direction: row-reverse; }
        
        .message-content { padding: 16px 20px; border-radius: 16px; line-height: 1.6; word-wrap: break-word; font-size: 1rem; }
        .message.user .message-content { background: linear-gradient(135deg, var(--blurple), var(--blurple-dark)); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px var(--blurple-alpha); white-space: pre-wrap; border: 1px solid rgba(255,255,255,0.1); }
        .message.ai .message-content { border-bottom-left-radius: 4px; } 

        /* Markdown Styles & Code Wrapper */
        .message-content p { margin-bottom: 12px; }
        .message-content p:last-child { margin-bottom: 0; }
        .message-content h1, .message-content h2, .message-content h3 { margin: 16px 0 10px 0; font-weight: 600; display: flex; align-items: center; gap: 8px;}
        .message-content ul, .message-content ol { margin-left: 24px; margin-bottom: 12px; }
        .message-content a { color: #8ea1ff; text-decoration: none; }
        .message-content a:hover { text-decoration: underline; }
        
        /* New Code Block Design */
        .code-wrapper { background-color: var(--bg-code); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin: 16px 0; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .code-header { background: rgba(0, 0, 0, 0.4); padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid rgba(255,255,255,0.05); text-transform: uppercase; letter-spacing: 1px;}
        .code-header i { font-size: 1rem; margin-right: 6px; color: var(--blurple); }
        .code-wrapper pre { padding: 16px; margin: 0; overflow-x: auto; background: transparent; }
        .code-wrapper code { font-family: 'Courier New', Courier, monospace; font-size: 0.95em; color: var(--text-light); }
        
        /* Inline Code */
        .message-content p code, .message-content li code { background-color: rgba(0,0,0,0.4); padding: 3px 6px; border-radius: 6px; font-size: 0.9em; border: 1px solid rgba(255,255,255,0.05); color: #a3a8ff; font-family: 'Courier New', Courier, monospace;}

        /* Input Area */
        .input-area { padding: 20px; display: flex; gap: 12px; align-items: center; border-top: 1px solid rgba(255,255,255,0.08); background: rgba(20, 20, 25, 0.4); backdrop-filter: blur(10px); }
        .input-area textarea { flex: 1; background: rgba(0,0,0,0.2); color: var(--text-light); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px; resize: none; outline: none; height: 56px; font-size: 1rem; transition: border-color 0.2s, background 0.2s; }
        .input-area textarea:focus { border-color: var(--blurple); background: rgba(0,0,0,0.4); }
        .btn-send { background-color: var(--blurple); color: white; border: none; width: 56px; height: 56px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: all 0.2s; box-shadow: 0 4px 15px var(--blurple-alpha); }
        .btn-send:hover { background-color: var(--blurple-dark); transform: scale(1.05); }
        .btn-send:disabled { background: rgba(255,255,255,0.1); color: var(--text-muted); cursor: not-allowed; box-shadow: none; transform: none; }

        /* Settings Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 200; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; animation: fadeIn 0.2s ease forwards; }
        .modal-content { padding: 30px; border-radius: 20px; width: 450px; max-width: 90%; animation: scaleIn 0.3s ease forwards; max-height: 90vh; overflow-y: auto;}
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .modal-header h2 { font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .close-btn { background: transparent; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; transition: color 0.2s; }
        .close-btn:hover { color: var(--text-light); }

        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .form-group label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px;}
        .form-group input, .form-group select { padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: var(--text-light); outline: none; font-size: 1rem; transition: all 0.2s; }
        .form-group input:focus, .form-group select:focus { border-color: var(--blurple); background: rgba(0,0,0,0.4); }
        
        /* Custom Model Selector with Search */
        .custom-select-wrapper { position: relative; width: 100%; user-select: none; }
        .custom-select-trigger { padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
        .custom-select-trigger:hover { border-color: var(--blurple); background: rgba(0,0,0,0.4); }
        
        .custom-select-options { display: none; position: absolute; top: calc(100% + 8px); left: 0; right: 0; max-height: 280px; border-radius: 12px; z-index: 10; padding: 0; flex-direction: column; overflow: hidden; }
        .custom-select-options.open { display: flex; animation: slideUp 0.2s ease forwards; }
        
        .search-container { padding: 10px; background: rgba(0,0,0,0.4); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 8px; position: sticky; top: 0; z-index: 11;}
        .search-container i { color: var(--text-muted); font-size: 1.2rem;}
        .search-container input { width: 100%; background: transparent; border: none; color: var(--text-light); outline: none; font-size: 0.95rem; }
        
        .options-list-scroll { overflow-y: auto; max-height: 230px; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
        
        .optgroup-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; padding: 10px 12px 4px; letter-spacing: 1px; display: flex; align-items: center; gap: 6px;}
        .custom-option { padding: 10px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: background 0.2s; }
        .custom-option:hover { background: rgba(255,255,255,0.1); }
        .custom-option.selected { background: var(--blurple-alpha); border: 1px solid var(--blurple); }
        
        /* Brand Logos */
        .brand-logo { width: 24px; height: 24px; border-radius: 6px; object-fit: contain; background: white; padding: 2px;}
        .fallback-logo { width: 24px; height: 24px; border-radius: 6px; background: linear-gradient(135deg, var(--blurple), #a334fa); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; }

        .btn-blurple { background-color: var(--blurple); color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 1rem; width: 100%; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 15px var(--blurple-alpha); }
        .btn-blurple:hover { background-color: var(--blurple-dark); transform: translateY(-2px); }
        .btn-blurple:disabled { background: rgba(255,255,255,0.1); color: var(--text-muted); cursor: not-allowed; box-shadow: none; transform: none; }

        .system-msg { text-align: center; color: var(--text-muted); font-size: 0.95rem; margin: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; height: 100%;}
        .system-msg i { font-size: 2.5rem; color: var(--blurple); opacity: 0.8; filter: drop-shadow(0 0 10px var(--blurple-alpha)); }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>

    <div id="landing-page">
        <h1><i class="ph-fill ph-planet"></i> Horizon.AI</h1>
        <p>Your unified, glassmorphic gateway to top-tier LLMs.</p>
        <button class="btn-launch" onclick="enterApp()">
            Enter Workspace <i class="ph ph-arrow-right"></i>
        </button>
    </div>

    <div id="app-container">
        <div class="app-flex">
            <div class="sidebar glass">
                <div class="brand">
                    <i class="ph-fill ph-planet"></i> Horizon
                </div>
                <button class="sidebar-btn" onclick="clearChat()">
                    <i class="ph-fill ph-chat-teardrop-text"></i> New Chat
                </button>
                <div class="spacer"></div>
                <button class="sidebar-btn" onclick="toggleSettings(true)">
                    <i class="ph-fill ph-faders"></i> Configuration
                </button>
            </div>

            <div class="chat-container glass">
                <div class="messages" id="chatBox">
                    <div class="system-msg" id="placeholderMsg">
                        <i class="ph-fill ph-sparkle"></i>
                        <span>Welcome to Horizon. Configure your API key to begin.</span>
                    </div>
                </div>
                <div class="input-area">
                    <textarea id="userInput" placeholder="Message Horizon.AI..." onkeypress="handleEnter(event)"></textarea>
                    <button class="btn-send" id="sendBtn" onclick="sendMessage()">
                        <i class="ph-fill ph-paper-plane-tilt"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2><i class="ph-fill ph-sliders-horizontal"></i> AI Configuration</h2>
                <button class="close-btn" onclick="toggleSettings(false)"><i class="ph ph-x"></i></button>
            </div>
            
            <div class="form-group">
                <label for="provider"><i class="ph-fill ph-cloud-network"></i> AI Provider</label>
                <select id="provider" onchange="handleProviderChange()">
                    <option value="openrouter">OpenRouter</option>
                    <option value="aistudio">Google AI Studio</option>
                </select>
            </div>

            <div class="form-group">
                <label for="apiKey"><i class="ph-fill ph-key"></i> API Key</label>
                <input type="password" id="apiKey" placeholder="Enter API Key" onchange="saveSettings()">
            </div>

            <button class="btn-blurple" onclick="fetchModels()" id="fetchBtn" style="margin-bottom: 16px;">
                <i class="ph-fill ph-arrows-clockwise"></i> Fetch Models
            </button>

            <div class="form-group">
                <label><i class="ph-fill ph-cpu"></i> Select Model</label>
                <div class="custom-select-wrapper">
                    <div class="custom-select-trigger" id="modelSelectTrigger" onclick="toggleModelDropdown()">
                        <span>Fetch models first...</span>
                        <i class="ph-fill ph-caret-down"></i>
                    </div>
                    <div class="custom-select-options glass" id="modelSelectOptions">
                        <div class="search-container">
                            <i class="ph ph-magnifying-glass"></i>
                            <input type="text" id="modelSearchBox" placeholder="Search models..." onkeyup="filterModels()" onclick="event.stopPropagation()">
                        </div>
                        <div class="options-list-scroll" id="modelListContainer">
                            </div>
                    </div>
                </div>
                <input type="hidden" id="modelSelect" onchange="saveSettings()">
            </div>
        </div>
    </div>

    <script>
        let chatHistory = [];
        let allModelsData = {}; 
        
        // Custom Marked.js Renderer for Code Blocks
        const renderer = new marked.Renderer();
        renderer.code = function(code, language) {
            const lang = language || 'text';
            // Basic HTML escape for the code content to prevent injection within <pre>
            const escapedCode = code.replace(/[&<>"']/g, function(m) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
            });

            return `
            <div class="code-wrapper">
                <div class="code-header">
                    <span><i class="ph-fill ph-file-code"></i> ${lang.toUpperCase()}</span>
                </div>
                <pre><code class="language-${lang}">${escapedCode}</code></pre>
            </div>`;
        };

        window.onload = () => {
            const savedProvider = localStorage.getItem('horizon_provider') || 'openrouter';
            const savedKey = localStorage.getItem('horizon_key') || '';
            const savedModel = localStorage.getItem('horizon_model') || '';

            document.getElementById('provider').value = savedProvider;
            document.getElementById('apiKey').value = savedKey;
            
            if (savedKey && savedModel) {
                document.getElementById('modelSelect').value = savedModel;
                document.getElementById('modelSelectTrigger').innerHTML = `<span>${savedModel}</span> <i class="ph-fill ph-caret-down"></i>`;
            }
            
            // Initialize Marked with custom renderer
            marked.use({ renderer });
            marked.setOptions({ breaks: true, gfm: true });
        };

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.custom-select-wrapper')) {
                document.getElementById('modelSelectOptions').classList.remove('open');
            }
        });

        function enterApp() {
            const landing = document.getElementById('landing-page');
            landing.style.animation = "fadeOut 0.5s ease forwards";
            setTimeout(() => {
                landing.style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
            }, 500);
        }

        function toggleSettings(show) {
            const modal = document.getElementById('settingsModal');
            if (show) modal.classList.add('active');
            else modal.classList.remove('active');
        }

        function saveSettings() {
            localStorage.setItem('horizon_provider', document.getElementById('provider').value);
            localStorage.setItem('horizon_key', document.getElementById('apiKey').value);
            localStorage.setItem('horizon_model', document.getElementById('modelSelect').value);
        }

        function handleProviderChange() {
            document.getElementById('modelSelectTrigger').innerHTML = `<span>Fetch models first...</span> <i class="ph-fill ph-caret-down"></i>`;
            document.getElementById('modelListContainer').innerHTML = '';
            document.getElementById('modelSelect').value = '';
            saveSettings();
        }

        function toggleModelDropdown() {
            const optionsDiv = document.getElementById('modelSelectOptions');
            const listContainer = document.getElementById('modelListContainer');
            if (listContainer.innerHTML.trim() !== "") {
                optionsDiv.classList.toggle('open');
                // Auto focus search box
                if(optionsDiv.classList.contains('open')) {
                    document.getElementById('modelSearchBox').focus();
                }
            }
        }

        // Search Filter Logic
        function filterModels() {
            const query = document.getElementById('modelSearchBox').value.toLowerCase();
            const options = document.querySelectorAll('.custom-option');
            const groups = document.querySelectorAll('.optgroup-label');

            options.forEach(opt => {
                const text = opt.innerText.toLowerCase();
                opt.style.display = text.includes(query) ? 'flex' : 'none';
            });

            // Hide brand groups if all their models are filtered out
            groups.forEach(group => {
                let hasVisible = false;
                let next = group.nextElementSibling;
                while (next && next.classList.contains('custom-option')) {
                    if (next.style.display !== 'none') {
                        hasVisible = true;
                        break;
                    }
                    next = next.nextElementSibling;
                }
                group.style.display = hasVisible ? 'flex' : 'none';
            });
        }

        function getBrandLogo(brand) {
            const domains = {
                'openai': 'openai.com', 'google': 'google.com', 'anthropic': 'anthropic.com',
                'meta': 'meta.com', 'mistral': 'mistral.ai', 'cohere': 'cohere.com', 'perplexity': 'perplexity.ai'
            };
            const domain = domains[brand.toLowerCase()];
            if (domain) {
                return `<img src="https://logo.clearbit.com/${domain}" onerror="this.outerHTML='<div class=\\'fallback-logo\\'>${brand.charAt(0).toUpperCase()}</div>'" class="brand-logo" />`;
            }
            return `<div class="fallback-logo">${brand.charAt(0).toUpperCase()}</div>`;
        }

        async function fetchModels() {
            const provider = document.getElementById('provider').value;
            const apiKey = document.getElementById('apiKey').value;
            const btn = document.getElementById('fetchBtn');
            const trigger = document.getElementById('modelSelectTrigger');

            if (!apiKey) return alert("Please enter an API key first.");

            btn.disabled = true;
            btn.innerHTML = '<i class="ph ph-spinner ph-spin"></i> Fetching...';
            trigger.innerHTML = `<span>Loading...</span> <i class="ph-fill ph-caret-down"></i>`;

            try {
                let modelsArray = [];
                if (provider === 'openrouter') {
                    const res = await fetch("https://openrouter.ai/api/v1/models");
                    const data = await res.json();
                    modelsArray = data.data.map(m => m.id);
                } else if (provider === 'aistudio') {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                    const data = await res.json();
                    if(data.error) throw new Error(data.error.message);
                    modelsArray = data.models.filter(m => m.supportedGenerationMethods.includes("generateContent")).map(m => m.name.replace('models/', '')); 
                }
                
                groupAndRenderModels(modelsArray, provider);
            } catch (error) {
                console.error(error);
                alert("Failed to fetch models.");
                trigger.innerHTML = `<span>Error fetching models</span> <i class="ph-fill ph-caret-down"></i>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="ph-fill ph-arrows-clockwise"></i> Fetch Models';
            }
        }

        function groupAndRenderModels(modelsArray, provider) {
            allModelsData = {}; 
            
            modelsArray.forEach(m => {
                let brand = 'Other';
                let displayName = m;

                if (provider === 'openrouter') {
                    const parts = m.split('/');
                    if (parts.length > 1) {
                        brand = parts[0];
                        displayName = parts.slice(1).join('/');
                    }
                } else {
                    brand = 'Google';
                }

                brand = brand.charAt(0).toUpperCase() + brand.slice(1);
                if (!allModelsData[brand]) allModelsData[brand] = [];
                allModelsData[brand].push({ id: m, name: displayName });
            });

            const optionsContainer = document.getElementById('modelListContainer');
            optionsContainer.innerHTML = '';
            document.getElementById('modelSearchBox').value = ''; // Reset search

            for (const [brand, models] of Object.entries(allModelsData)) {
                const groupLabel = document.createElement('div');
                groupLabel.className = 'optgroup-label';
                groupLabel.innerHTML = `<i class="ph-fill ph-buildings"></i> ${brand}`;
                optionsContainer.appendChild(groupLabel);

                models.forEach(model => {
                    const opt = document.createElement('div');
                    opt.className = 'custom-option';
                    opt.innerHTML = `${getBrandLogo(brand)} <span>${model.name}</span>`;
                    
                    opt.onclick = () => {
                        document.getElementById('modelSelect').value = model.id;
                        document.getElementById('modelSelectTrigger').innerHTML = `${getBrandLogo(brand)} <span>${model.name}</span> <i class="ph-fill ph-caret-down"></i>`;
                        document.getElementById('modelSelectOptions').classList.remove('open');
                        
                        document.querySelectorAll('.custom-option').forEach(el => el.classList.remove('selected'));
                        opt.classList.add('selected');
                        saveSettings();
                    };
                    optionsContainer.appendChild(opt);
                });
            }

            document.getElementById('modelSelectTrigger').innerHTML = `<span>Select a model...</span> <i class="ph-fill ph-caret-down"></i>`;
        }

        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const inputEl = document.getElementById('userInput');
            const text = inputEl.value.trim();
            const provider = document.getElementById('provider').value;
            const apiKey = document.getElementById('apiKey').value;
            const model = document.getElementById('modelSelect').value;
            const sendBtn = document.getElementById('sendBtn');

            if (!text || !apiKey || !model) {
                if(!apiKey || !model) {
                    toggleSettings(true);
                    alert("Ensure API key and Model are selected.");
                }
                return;
            }

            appendMessage('user', text);
            inputEl.value = '';
            chatHistory.push({ role: 'user', content: text });

            sendBtn.disabled = true;
            sendBtn.innerHTML = '<i class="ph ph-spinner ph-spin"></i>';

            try {
                let aiResponseText = "";

                if (provider === 'openrouter') {
                    const payload = { model: model, messages: chatHistory };
                    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                        method: "POST",
                        headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);
                    aiResponseText = data.choices[0].message.content;

                } else if (provider === 'aistudio') {
                    const geminiHistory = chatHistory.map(msg => ({
                        role: msg.role === 'user' ? 'user' : 'model',
                        parts: [{ text: msg.content }]
                    }));
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: geminiHistory })
                    });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);
                    aiResponseText = data.candidates[0].content.parts[0].text;
                }

                appendMessage('ai', aiResponseText);
                chatHistory.push({ role: 'assistant', content: aiResponseText });

            } catch (error) {
                console.error(error);
                appendMessage('ai', `⚠️ Error: ${error.message}`);
                chatHistory.pop(); 
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = '<i class="ph-fill ph-paper-plane-tilt"></i>';
            }
        }

        function appendMessage(role, text) {
            document.getElementById('placeholderMsg')?.remove();
            
            const chatBox = document.getElementById('chatBox');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            const senderDiv = document.createElement('div');
            senderDiv.className = 'message-sender';
            senderDiv.innerHTML = role === 'user' ? 'You <i class="ph-fill ph-user-circle"></i>' : '<i class="ph-fill ph-planet"></i> Horizon.AI';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = role === 'ai' ? 'message-content glass' : 'message-content';
            
            if (role === 'ai') {
                const rawHtml = marked.parse(text);
                // DOMPurify handles custom classes fine, enabling the code wrapper to persist
                const cleanHtml = DOMPurify.sanitize(rawHtml);
                contentDiv.innerHTML = cleanHtml;
            } else {
                contentDiv.innerText = text; 
            }
            
            msgDiv.appendChild(senderDiv);
            msgDiv.appendChild(contentDiv);
            chatBox.appendChild(msgDiv);
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function clearChat() {
            chatHistory = [];
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = '<div class="system-msg" id="placeholderMsg"><i class="ph-fill ph-sparkle"></i><span>Chat cleared. Start a new conversation.</span></div>';
        }
    </script>
</body>
</html>
